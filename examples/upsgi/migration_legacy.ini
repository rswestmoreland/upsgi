[uwsgi]
master = true
workers = 2
need-app = true
strict = true
vacuum = true
die-on-term = true
http-socket = :9090
psgi = examples/upsgi/app.psgi
static-map = /assets=examples/upsgi/public
logto = ./upsgi.log
log-x-forwarded-for = true
http-modifier1 = 5
http-modifier2 = 0
perl-no-die-catch = true

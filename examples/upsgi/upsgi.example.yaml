upsgi:
  master: true
  workers: 2
  need-app: true
  strict: true
  vacuum: true
  die-on-term: true
  http-socket: 127.0.0.1:9090
  psgi: /srv/upsgi/app.psgi
  logto: /var/log/upsgi/app.log
  static-map: /static=/srv/upsgi/static

  # Reverse-proxy options
  # enable-proxy-protocol: false
  # log-x-forwarded-for: true

  # PSGI / Perl options
  # log-exceptions: false
  # psgi-enable-psgix-io: false

  # Default-on troubleshooting toggles
  # disable-thunder-lock: true
  # disable-body-scheduler: true
  # disable-log-queue: true

  # Logging queue sizing
  # log-queue-records: 512
  # log-queue-bytes: 524288
